<div class="auth-page">

  <div class="auth-card">

    <div class="auth-header">

      <div class="logo-circle">
        <i class="fa-solid fa-bug"></i>
      </div>

      <h1>Join G-RELLO</h1>

      <p>
        Create your workspace and start managing projects.
      </p>

    </div>

    <div class="field">

      <label>First Name</label>

      <input
        [(ngModel)]="firstName"
        placeholder="John"
      >

    </div>

    <div class="field">

      <label>Last Name</label>

      <input
        [(ngModel)]="lastName"
        placeholder="Doe"
      >

    </div>

    <div class="field">

      <label>Email</label>

      <input
        type="email"
        [(ngModel)]="email"
        placeholder="john@example.com"
      >

    </div>

    <div class="field">

      <label>Password</label>

      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
      >

    </div>

    <button
      class="btn btn-primary auth-btn"
      (click)="register()"
    >
      Create Account
    </button>

    <div class="auth-footer">

      <span>Already have an account?</span>

      <a routerLink="/login">
        Sign in
      </a>

    </div>

  </div>

</div>
