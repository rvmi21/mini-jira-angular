<div class="auth-page">

  <div class="auth-card">

    <div class="auth-header">
      <h1>Mini Jira</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="auth-form">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          class="input"
          [(ngModel)]="email"
          placeholder="john@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          class="input"
          [(ngModel)]="password"
          placeholder="••••••••">
      </div>

      <button
        class="btn btn-primary auth-button"
        (click)="login()">
        Sign In
      </button>

    </div>

  </div>

</div>
